# Global system settings. Env vars override (e.g. ALPHA_DB_PATH).

database:
  path: data/alpha_engine.duckdb

logging:
  level: INFO
  json: false  # set true for production / log aggregation

data:
  # Default lookback for backfills (days)
  default_history_days: 1825  # ~5 years
  # User-Agent for HTTP requests
  user_agent: "AlphaEngine/0.1"

risk:
  # VaR confidence levels
  var_confidence_levels: [0.95, 0.99]
  # Lookback window for correlation matrix (trading days)
  correlation_window: 60
  # Kelly fraction (1.0 = full Kelly, 0.25 = quarter Kelly, recommended)
  kelly_fraction: 0.25
  # Treat correlations above this as "regime convergence" warning
  correlation_alert_threshold: 0.7

# Default FRED series to track for macro context
fred_series:
  - id: DGS10        # 10-year Treasury
    name: 10Y Treasury Yield
  - id: DGS2         # 2-year Treasury
    name: 2Y Treasury Yield
  - id: T10Y2Y       # 10y-2y spread (yield curve)
    name: 10Y-2Y Spread
  - id: DFF          # Effective Fed Funds Rate
    name: Fed Funds Rate
  - id: DGS3MO       # 3-month Treasury (canonical risk-free rate for Sharpe)
    name: 3M Treasury Yield
  - id: CPIAUCSL     # CPI
    name: CPI
  - id: UNRATE       # Unemployment rate
    name: Unemployment Rate
  - id: VIXCLS       # VIX
    name: VIX
  - id: DCOILWTICO   # WTI crude oil
    name: WTI Crude Oil
  - id: DEXUSEU      # USD/EUR
    name: USD/EUR
  - id: SAHMREALTIME # Sahm Rule recession indicator
    name: Sahm Rule
